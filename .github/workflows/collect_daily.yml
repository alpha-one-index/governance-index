name: GovernanceIndex Collection (Daily)
on:
  schedule:
    - cron: '0 6 * * *'  # Runs at 6:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        run: python -m pipelines.collect

      - name: Run enrichment pipeline
        run: python -m pipelines.enrich

      - name: Commit & push exports
        run: |
          git config user.name "GovernanceIndex Bot"
          git config user.email "bot@governanceindex.com"
          git add exports/
          git diff --cached --quiet || git commit -m "data: daily collection update $(date -u +%Y-%m-%d)"
          git push
